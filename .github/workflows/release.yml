# aura release — build prebuilt binaries for Linux + macOS on a version tag and
# publish them to a GitHub Release. Windows is intentionally NOT built here: it
# stays source-build (install.ps1 / docs/ONBOARDING.md). Each archive carries
# BOTH binaries (aura-cli + aura-server) plus the on-PATH helper scripts and the
# host skill, so `install_bin.sh` can set up a full client or server with no
# toolchain and no compile step.
#
# Trigger: push a version tag, e.g. `git tag v0.1.0 && git push origin v0.1.0`.
# Uploads run with the built-in GITHUB_TOKEN (Settings -> Actions -> Workflow
# permissions must allow "Read and write"); no extra secret is needed.

name: release

on:
  push:
    tags:
      - 'v*'

jobs:
  # --- 1. Build one archive per Linux/macOS target on a native runner ---------
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    # Linux legs build INSIDE an ubuntu:20.04 container so the binaries link
    # against glibc 2.31 — a binary requires the glibc it was built on, so the
    # build floor IS the runtime floor. Building on the runner's own 22.04+
    # image produced binaries needing GLIBC_2.34, which fail on Ubuntu 20.04 /
    # Debian 11 machines. (GitHub retired the ubuntu-20.04 runners; the
    # container is the supported way to keep the old floor.)
    container: ${{ matrix.container }}
    # Inside a job container the runner's default `run:` shell is plain `sh`
    # (dash) — `set -o pipefail` and other bashisms fail there. Force bash for
    # every step (present in ubuntu:20.04 and on the macOS runners alike).
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux: glibc 2.31 floor via the 20.04 container (runner arch picks
          # the matching image variant).
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            container: ubuntu:20.04
          - os: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
            container: ubuntu:20.04
          # macOS: the arm64 runner builds both slices (x86_64 via cross codegen).
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Guard: the pushed tag must match [workspace.package] version, or the
      # published binaries would report a different `--version` than the
      # release they came from (a silent support headache). Fail fast with the
      # exact fix. Runs before any toolchain/build cost.
      - name: Verify tag matches the workspace version
        shell: bash
        run: |
          set -euo pipefail
          ver="$(awk -F'"' '/^\[workspace\.package\]/{s=1} s && /^version *=/{print $2; exit}' Cargo.toml)"
          tag="${GITHUB_REF_NAME}"
          if [ "v$ver" != "$tag" ]; then
            echo "::error::release tag '$tag' does not match [workspace.package] version '$ver' in Cargo.toml." \
                 " Bump the version in the root Cargo.toml, commit, then re-tag (expected tag: v$ver)."
            exit 1
          fi
          echo "tag $tag matches workspace version $ver"

      # Inside the ubuntu:20.04 container we are root with a minimal image: no
      # sudo, no compiler, no curl. Install everything the build needs —
      # including libasound2-dev (cpal links it for aura-cli).
      - name: Install build prerequisites (Linux container)
        if: runner.os == 'Linux'
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            ca-certificates curl git build-essential pkg-config libasound2-dev

      # Rust inside the container: plain rustup (the setup action is tuned for
      # the runner image). `--default-toolchain none` + rust-toolchain.toml
      # keeps the pinned 1.92.0 as the single source of truth.
      - name: Install Rust toolchain (Linux container, from rust-toolchain.toml)
        if: runner.os == 'Linux'
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
            | sh -s -- -y --profile minimal --default-toolchain none
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Install Rust toolchain (macOS, from rust-toolchain.toml)
        if: runner.os == 'macOS'
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ matrix.target }}
          rustflags: ''          # a release build should not fail on warnings
          cache: false

      - name: Build aura-cli + aura-server (release)
        run: cargo build --release --target ${{ matrix.target }} -p aura-cli -p aura-server

      # Belt-and-braces: fail the release if the produced Linux binary demands
      # a glibc newer than the 20.04 floor (2.31) — catches a future toolchain
      # or dependency silently raising the requirement.
      - name: Verify glibc floor (Linux)
        if: runner.os == 'Linux'
        run: |
          set -euo pipefail
          bad=$(objdump -T "target/${{ matrix.target }}/release/aura-cli" \
                          "target/${{ matrix.target }}/release/aura-server" 2>/dev/null \
                | grep -oE 'GLIBC_2\.[0-9]+' | sort -Vu \
                | awk -F. '$2 > 31' || true)
          if [ -n "$bad" ]; then
            echo "::error::binaries require glibc symbols above the 2.31 floor: $bad"
            exit 1
          fi
          echo "glibc floor OK (<= 2.31)"
          # And they must actually run in this (oldest-supported) environment
          # (libasound2 is present via the dev package installed above).
          "target/${{ matrix.target }}/release/aura-server" --version
          "target/${{ matrix.target }}/release/aura-cli" --version

      # Same idea for macOS: the deployment target (minos) embedded in the
      # Mach-O header IS the runtime floor. Rust's defaults are 11.0 (arm64 —
      # every Apple Silicon Mac) and 10.12 (Intel); fail the release if a
      # toolchain/dependency change silently raises it past the ceiling and
      # would cut off users on older macOS.
      - name: Verify macOS deployment-target floor
        if: runner.os == 'macOS'
        run: |
          set -euo pipefail
          case "${{ matrix.target }}" in
            aarch64-*) ceil="11.0" ;;
            *)         ceil="10.13" ;;
          esac
          for bin in aura-cli aura-server; do
            f="target/${{ matrix.target }}/release/$bin"
            minos=$(otool -l "$f" | awk '/LC_BUILD_VERSION/{s=1} s && $1=="minos" {print $2; exit}')
            if [ -z "$minos" ]; then
              minos=$(otool -l "$f" | awk '/LC_VERSION_MIN_MACOSX/{s=1} s && $1=="version" {print $2; exit}')
            fi
            [ -n "$minos" ] || { echo "::error::$bin: could not read the deployment target"; exit 1; }
            # Normalize to major.minor ("11.0.0" and "11.0" must compare equal).
            minos=$(echo "$minos" | cut -d. -f1,2)
            echo "$bin minos=$minos (ceiling $ceil)"
            lowest=$(printf '%s\n%s\n' "$minos" "$ceil" | sort -V | head -1)
            if [ "$lowest" != "$minos" ] && [ "$minos" != "$ceil" ]; then
              echo "::error::$bin requires macOS $minos — above the $ceil floor ceiling (a toolchain/dependency raised the deployment target)"
              exit 1
            fi
          done
          # Native-arch smoke: the binaries must actually run on this runner.
          if [ "$(uname -m)" = "arm64" ] && [ "${{ matrix.target }}" = "aarch64-apple-darwin" ]; then
            "target/${{ matrix.target }}/release/aura-server" --version
            "target/${{ matrix.target }}/release/aura-cli" --version
          fi

      - name: Package archive + checksum
        shell: bash
        run: |
          set -euo pipefail
          triple="${{ matrix.target }}"
          bin="target/$triple/release"
          stage="aura-$triple"
          mkdir -p "$stage"
          # Both binaries + the on-PATH helpers + the host skill, so one archive
          # sets up a full client or server.
          cp "$bin/aura-cli" "$bin/aura-server" "$stage/"
          cp scripts/launch-call.sh    "$stage/aura-call"
          cp scripts/call-status.sh    "$stage/aura-call-status"
          cp scripts/inbox.sh          "$stage/aura-inbox"
          cp scripts/aura-open-port.sh "$stage/aura-open-port"
          cp skills/SKILL.md           "$stage/SKILL.md"
          # Third-party license texts: the BSD-3-Clause components we
          # statically link (sonora/WebRTC APM) require their notice to
          # accompany binary redistributions.
          cp THIRD_PARTY_LICENSES.md   "$stage/THIRD_PARTY_LICENSES.md"
          chmod +x "$stage/aura-cli" "$stage/aura-server" \
                   "$stage/aura-call" "$stage/aura-call-status" "$stage/aura-inbox" "$stage/aura-open-port"
          # Flat archive (files at the top level; no wrapping dir).
          tar -czf "$stage.tar.gz" -C "$stage" .
          # Bare-hash sidecar (portable; install_bin.sh compares it directly).
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "$stage.tar.gz" | awk '{print $1}' > "$stage.tar.gz.sha256"
          else
            shasum -a 256 "$stage.tar.gz" | awk '{print $1}' > "$stage.tar.gz.sha256"
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: aura-${{ matrix.target }}
          path: |
            aura-${{ matrix.target }}.tar.gz
            aura-${{ matrix.target }}.tar.gz.sha256
          if-no-files-found: error

  # --- 2. Collect all archives and publish them to one GitHub Release ---------
  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write          # create the Release and upload assets
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.tar.gz.sha256
          fail_on_unmatched_files: true
          generate_release_notes: true
